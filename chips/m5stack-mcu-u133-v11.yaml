key: m5stack-mcu-u133-v11
name: Unit KMeter-ISO controller
manufacturer: M5Stack
tags: [temperature, thermocouple, isolated]
addresses:
  - addr: "0x66"
datasheets:
  - source: vendor
    vendor: m5stack
    url: https://docs.m5stack.com/en/unit/KMeterISO%20Unit
notes: |
  Firmware-defined I2C slave: the I2C endpoint is an on-board STM32F030 running M5Stack
  firmware (not a fixed-function IC), so the register map is product-specific and is grown
  from captures rather than a datasheet. Modeled per-unit. Silicon: STM32F030. The MCU reads a MAX31855 thermocouple converter through an isolator (not on the I2C bus). Used in M5Stack Unit KMeter-ISO (U133-V11) at 0x66.
