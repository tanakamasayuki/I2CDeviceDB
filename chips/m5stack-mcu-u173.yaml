key: m5stack-mcu-u173
name: Unit QRCode controller
manufacturer: M5Stack
tags: [qrcode, scanner]
addresses:
  - addr: "0x21"
datasheets:
  - source: vendor
    vendor: m5stack
    url: https://docs.m5stack.com/en/unit/Unit-QRCode
notes: |
  Firmware-defined I2C slave: the I2C endpoint is an on-board STM32F030 running M5Stack
  firmware (not a fixed-function IC), so the register map is product-specific and is grown
  from captures rather than a datasheet. Modeled per-unit. Silicon: STM32F030. Used in M5Stack Unit QRCode (U173) at 0x21.
