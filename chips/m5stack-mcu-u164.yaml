key: m5stack-mcu-u164
name: Unit AC Measure controller
manufacturer: M5Stack
tags: [power, ac, metering]
addresses:
  - addr: "0x42"
datasheets:
  - source: vendor
    vendor: m5stack
    url: https://docs.m5stack.com/en/unit/AC%20Measure%20Unit
notes: |
  Firmware-defined I2C slave: the I2C endpoint is an on-board STM32G030 running M5Stack
  firmware (not a fixed-function IC), so the register map is product-specific and is grown
  from captures rather than a datasheet. Modeled per-unit. Silicon: STM32G030. The MCU reads an HLW8032 energy-metering chip (UART, not on the I2C bus). Used in M5Stack Unit AC Measure (U164) at 0x42.
