key: rcwl-9620
name: RCWL-9620
manufacturer: RCWL (Shenzhen Richen IoT Technology)
tags: [distance, ultrasonic]
addresses:
  - addr: "0x57"
datasheets:
  - source: vendor
    vendor: m5stack
    url: https://m5stack-doc.oss-cn-shenzhen.aliyuncs.com/697/RCWL-9620-V1.0.pdf
    revision: "1.0"
notes: |
  40 kHz ultrasonic distance-measuring chip with a 16 mm probe and direct I2C output (address
  0x57), range ~2-450 cm (±2%), with better temperature compensation than the RCWL-9600.
  Command-based, no register map: write a trigger byte, then read a 3-byte (24-bit) distance
  result. Datasheet is a M5Stack-hosted copy. M5Stack Unit Ultrasonic-I2C uses it at 0x57.
