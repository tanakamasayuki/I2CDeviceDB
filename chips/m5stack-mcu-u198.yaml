notes: |
  Firmware-defined I2C slave: the I2C endpoint is an on-board STM32G031 running M5Stack
  firmware (not a fixed-function IC), so the register map is product-specific and is grown
  from captures rather than a datasheet. Modeled per-unit. Silicon: STM32G031. Used in M5Stack Unit Step16 (U198) at 0x48.
