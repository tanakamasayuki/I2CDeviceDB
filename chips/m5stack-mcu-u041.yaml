notes: |
  Firmware-defined I2C slave: the I2C endpoint is an on-board ATmega328 running M5Stack
  firmware (not a fixed-function IC), so the register map is product-specific and is grown
  from captures rather than a datasheet. Modeled per-unit. Silicon: ATmega328. Used in M5Stack Unit PbHub (U041) at 0x61.
