notes: |
  Firmware-defined I2C slave: the I2C endpoint is an on-board ATmega8A running M5Stack
  firmware (not a fixed-function IC), so the register map is product-specific and is grown
  from captures rather than a datasheet. Modeled per-unit. Silicon: ATmega8A. Used in M5Stack Unit Joystick v1.1 (U024-C) at 0x52.
