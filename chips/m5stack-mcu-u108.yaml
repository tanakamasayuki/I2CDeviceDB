key: m5stack-mcu-u108
name: Unit Scales controller
manufacturer: M5Stack
tags: [weight, loadcell, adc]
addresses:
  - addr: "0x26"
datasheets:
  - source: vendor
    vendor: m5stack
    url: https://m5stack-doc.oss-cn-shenzhen.aliyuncs.com/705/Unit-Scales_Protocol.pdf
notes: |
  Firmware-defined I2C slave: the I2C endpoint is an on-board STM32F030 running M5Stack
  firmware (not a fixed-function IC), so the register map is product-specific and is grown
  from captures rather than a datasheet. Modeled per-unit. Silicon: STM32F030. The MCU reads an HX711 load-cell ADC (not on the I2C bus). Used in M5Stack Unit Scales (U108) at 0x26.
