key: m5stack-mcu-u154
name: Unit 8Angle controller
manufacturer: M5Stack
tags: [potentiometer, adc, input]
addresses:
  - addr: "0x43"
datasheets:
  - source: vendor
    vendor: m5stack
    url: https://raw.githubusercontent.com/m5stack/M5Unit-8Angle/main/docs/8Angle_I2C_Protocol.pdf
notes: |
  Firmware-defined I2C slave: the I2C endpoint is an on-board STM32F030 running M5Stack
  firmware (not a fixed-function IC), so the register map is product-specific and is grown
  from captures rather than a datasheet. Modeled per-unit. Silicon: STM32F030. The docs.m5stack.com
  page only shows the protocol as an inline image; the linked PDF is the same table exported to PDF
  by the M5Unit-8Angle library repo. Used in M5Stack Unit 8Angle (U154) at 0x43.
