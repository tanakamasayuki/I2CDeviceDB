key: m5stack-mcu-u161
name: Unit ExtEncoder controller
manufacturer: M5Stack
tags: [encoder, input]
addresses:
  - addr: "0x59"
datasheets:
  - source: vendor
    vendor: m5stack
    url: https://raw.githubusercontent.com/m5stack/M5Unit-ExtEncoder/main/docs/Unit_ExtEncoder_I2C_Protocol.pdf
notes: |
  Firmware-defined I2C slave: the I2C endpoint is an on-board STM32F030 running M5Stack
  firmware (not a fixed-function IC), so the register map is product-specific and is grown
  from captures rather than a datasheet. Modeled per-unit. Silicon: STM32F030. Used in M5Stack Unit ExtEncoder (U161) at 0x59.
