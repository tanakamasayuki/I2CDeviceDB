key: pca9548a
name: PCA9548A
manufacturer: NXP
tags: [i2c-mux, i2c-switch]
addresses:
  - addr: "0x70"
    note: base (A0-A2=GND); pin-programmable 0x70-0x77
datasheets:
  - source: manufacturer
    url: https://www.nxp.com/docs/en/data-sheet/PCA9548A.pdf
notes: |
  8-channel bidirectional I2C switch. No register map: a single control byte selects which of the
  8 downstream channels are connected (one bit per channel; multiple may be enabled). Address set
  by A0/A1/A2 across 0x70-0x77. M5Stack Unit PaHub v2.0 uses it at 0x70.
