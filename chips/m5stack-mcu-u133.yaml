key: m5stack-mcu-u133
name: Unit KMeter controller
manufacturer: M5Stack
tags: [temperature, thermocouple]
addresses:
  - addr: "0x66"
datasheets:
  - source: vendor
    vendor: m5stack
    url: https://docs.m5stack.com/en/unit/kmeter
notes: |
  Firmware-defined I2C slave: the I2C endpoint is an on-board ESP32-C3 running M5Stack
  firmware (not a fixed-function IC), so the register map is product-specific and is grown
  from captures rather than a datasheet. Modeled per-unit. Silicon: ESP32-C3. The MCU reads a MAX31855 thermocouple converter (SPI, not on the I2C bus). Used in M5Stack Unit KMeter (U133) at 0x66.
