key: m5stack-mcu-u158
name: Unit Glass controller
manufacturer: M5Stack
tags: [display, oled]
addresses:
  - addr: "0x3d"
datasheets:
  - source: vendor
    vendor: m5stack
    url: https://docs.m5stack.com/en/unit/Glass%20Unit
notes: |
  Firmware-defined I2C slave: the I2C endpoint is an on-board STM32F030 running M5Stack
  firmware (not a fixed-function IC), so the register map is product-specific and is grown
  from captures rather than a datasheet. Modeled per-unit. Silicon: STM32F030. The MCU drives an SSD1309 OLED (not exposed on the external I2C bus). Used in M5Stack Unit Glass (U158) at 0x3d.
