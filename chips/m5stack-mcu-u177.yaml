key: m5stack-mcu-u177
name: Unit Mini Scales controller
manufacturer: M5Stack
tags: [weight, loadcell, adc]
addresses:
  - addr: "0x26"
datasheets:
  - source: vendor
    vendor: m5stack
    url: https://docs.m5stack.com/en/unit/Unit-Mini%20Scales
notes: |
  Firmware-defined I2C slave: the I2C endpoint is an on-board STM32F030 running M5Stack
  firmware (not a fixed-function IC), so the register map is product-specific and is grown
  from captures rather than a datasheet. Modeled per-unit. Silicon: STM32F030. The MCU reads an HX711 load-cell ADC (not on the I2C bus). Used in M5Stack Unit Mini Scales (U177) at 0x26.
